name: Deploy to mediasuite-acc.rdlabs.beeldengeluid.nl and mediasuite-test.rdlabs.beeldengeluid.nl
on:
  push:
    branches-ignore:
      - "main"

jobs:
  deploy:
    runs-on: self-hosted
    steps:
    - name: Update ansible
      run: |
        cd /opt/git/x-omgeving/ansible/
        sudo git pull
    - name: build the static files
      run: |
        cd /opt/git/x-omgeving/ansible/
        ansible-playbook mediasuite-website-build.yml --extra-vars "app_version=${GITHUB_REF##*/}"
    - name: autodeploy to acc with ansible
      run: |
        cd /opt/git/x-omgeving/ansible/
        ansible-playbook mediasuite-website-acc.yml --extra-vars "app_version=${GITHUB_REF##*/}"
    - name: autodeploy to tst with ansible
      run: |
        cd /opt/git/x-omgeving/ansible/
        ansible-playbook mediasuite-website-test.yml --extra-vars "app_version=${GITHUB_REF##*/}"
